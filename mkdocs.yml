site_name: Bytell Cloud
site_description: Multi-cloud free-tier infrastructure for bytell.com
site_url: https://cloud.bytell.com
repo_url: https://github.com/bytell-cloud/docs
repo_name: bytell-cloud/docs
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

nav:
  - Home: index.md
  - Infrastructure:
      - Overview: infra/overview.md
      - OCI: infra/oci.md
      - GCP: infra/gcp.md
      - Cloudflare: infra/cloudflare.md
  - Runbooks:
      - SSH access: runbooks/ssh-access.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
